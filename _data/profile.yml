short_bio: >-
  I am Xinting (Xenia) Liao. I study at Zhejiang University and work under the supervision of Prof. <a href="https://scholar.google.com/citations?user=MY23M60AAAAJ">Xiaolin Zheng</a> and <a href="https://scholar.google.com/citations?user=qZTMyzwAAAAJ">Chaochao Chen</a>. Now I participate in the joint Ph.D. program in National University of Singapore with the supervision of Prof. <a href="https://scholar.google.com.sg/citations?user=Z9DWCBEAAAAJ">Tat-Seng Chua</a> and collaboration with Dr. <a href="https://scholar.google.com.sg/citations?user=Ma5DtmoAAAAJ">Wenjie Wang</a>. My research interests are computer vision, LLM, privacy-computing, federated learning, trustworthy machine learning.  <br> <text style="color:#8B0000; font-style:italic;">I am currently seeking a Postdoctoral opportunity.</text>

